<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkwell — A Blog Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Variables ── */
  :root {
    --ink: #0e0e0e;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c9472b;
    --accent2: #2b6cb0;
    --muted: #7a7468;
    --border: #d4cdc0;
    --card: #faf7f2;
    --shadow: 0 2px 20px rgba(14,14,14,0.08);
    --shadow-lg: 0 8px 40px rgba(14,14,14,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast-item {
    background: var(--ink); color: var(--paper);
    padding: 12px 18px; border-radius: 4px;
    font-size: 0.85rem; font-family: 'DM Mono', monospace;
    border-left: 3px solid var(--accent);
    animation: slideIn 0.3s ease;
    max-width: 300px;
  }
  .toast-item.success { border-left-color: #3d8b5e; }
  .toast-item.error   { border-left-color: var(--accent); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 900;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); font-style: italic; }
  nav { display: flex; align-items: center; gap: 12px; }
  .nav-user {
    font-size: 0.8rem; color: #aaa;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 3px;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.2s;
    text-decoration: none;
  }
  .btn-ghost {
    background: transparent; color: var(--paper);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { background: #a83922; }
  .btn-secondary {
    background: var(--cream); color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
    font-size: 0.78rem; padding: 5px 12px;
  }
  .btn-danger:hover { background: var(--accent); color: #fff; }
  .btn-edit {
    background: transparent; color: var(--accent2);
    border: 1px solid var(--accent2);
    font-size: 0.78rem; padding: 5px 12px;
  }
  .btn-edit:hover { background: var(--accent2); color: #fff; }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Auth Page ── */
  #auth-page {
    min-height: calc(100vh - 64px);
    display: none; align-items: center; justify-content: center;
    padding: 60px 20px;
  }
  #auth-page.active { display: flex; }

  .auth-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .auth-header {
    background: var(--ink);
    padding: 32px 36px 28px;
    text-align: center;
  }
  .auth-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; color: var(--paper);
    font-style: italic;
  }
  .auth-header p {
    color: #999; font-size: 0.82rem; margin-top: 6px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; padding: 14px;
    text-align: center; cursor: pointer;
    font-size: 0.85rem; font-weight: 500;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .auth-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(201,71,43,0.04);
  }
  .auth-form { padding: 28px 36px 32px; }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; color: var(--ink);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,71,43,0.08);
  }
  .form-group textarea { resize: vertical; min-height: 120px; }
  .auth-form .btn { width: 100%; justify-content: center; padding: 12px; }

  /* ── Feed Page ── */
  #feed-page { display: none; }
  #feed-page.active { display: block; }

  .feed-layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 40px;
    align-items: start;
  }

  /* ── Sidebar ── */
  .sidebar {}
  .sidebar-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .sidebar-card-header {
    background: var(--ink);
    padding: 14px 20px;
  }
  .sidebar-card-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; color: var(--paper);
    letter-spacing: 0.01em;
  }
  .sidebar-card-body { padding: 20px; }
  .new-post-form .btn { width: 100%; justify-content: center; margin-top: 4px; }

  /* ── Posts Feed ── */
  .feed-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
  }
  .feed-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 900;
  }
  .feed-header .post-count {
    font-size: 0.8rem; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .posts-list { display: flex; flex-direction: column; gap: 24px; }

  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .post-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  .post-card-header { padding: 24px 28px 0; }
  .post-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .post-author {
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent);
  }
  .meta-sep { color: var(--border); font-size: 0.8rem; }
  .post-date {
    font-size: 0.75rem; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .post-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem; font-weight: 700;
    line-height: 1.3;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .post-content {
    padding: 0 28px 20px;
    font-size: 0.92rem; line-height: 1.75; color: #3a3530;
    white-space: pre-wrap; word-break: break-word;
  }
  .post-footer {
    padding: 14px 28px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cream);
  }
  .post-actions { display: flex; gap: 8px; }
  .comment-toggle {
    font-size: 0.8rem; color: var(--muted);
    font-family: 'DM Mono', monospace;
    cursor: pointer; background: none; border: none;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .comment-toggle:hover { color: var(--accent2); }
  .comment-toggle .icon { font-size: 1rem; }

  /* ── Edit Post inline ── */
  .edit-post-form { padding: 20px 28px; background: #f0ece3; border-top: 1px solid var(--border); }
  .edit-post-form .form-group { margin-bottom: 12px; }
  .edit-post-form .btn-row { display: flex; gap: 8px; }

  /* ── Comments ── */
  .comments-section {
    border-top: 1px solid var(--border);
    padding: 20px 28px;
    background: #f8f5ef;
    display: none;
  }
  .comments-section.open { display: block; }
  .comments-heading {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-style: italic;
    color: var(--muted); margin-bottom: 16px;
  }
  .comments-list { margin-bottom: 18px; display: flex; flex-direction: column; gap: 12px; }
  .comment-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    position: relative;
  }
  .comment-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .comment-author {
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent2);
  }
  .comment-date {
    font-size: 0.7rem; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .comment-text { font-size: 0.88rem; line-height: 1.6; }
  .comment-del {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 0.75rem; padding: 2px 6px;
    border-radius: 3px; transition: all 0.2s;
  }
  .comment-del:hover { color: var(--accent); background: rgba(201,71,43,0.08); }

  .add-comment { display: flex; gap: 8px; margin-top: 4px; }
  .add-comment input {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; color: var(--ink); outline: none;
    transition: border-color 0.2s;
  }
  .add-comment input:focus { border-color: var(--accent2); }
  .add-comment .btn { white-space: nowrap; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .feed-layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
    header { padding: 0 16px; }
    .feed-layout { padding: 24px 16px; }
    .auth-form { padding: 24px 20px 28px; }
    .auth-header { padding: 28px 20px 24px; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── Header ── -->
<header>
  <div class="logo">Ink<span>well</span></div>
  <nav id="nav">
    <span class="nav-user" id="nav-username"></span>
    <button class="btn btn-ghost" id="btn-logout" onclick="logout()" style="display:none">Sign Out</button>
    <button class="btn btn-ghost" onclick="showAuth('login')" id="btn-login">Sign In</button>
    <button class="btn btn-primary" onclick="showAuth('register')" id="btn-register">Join</button>
  </nav>
</header>

<!-- ── Auth Page ── -->
<div id="auth-page" class="page">
  <div class="auth-box">
    <div class="auth-header">
      <h1>Inkwell</h1>
      <p>A place for words that matter</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
    </div>
    <div class="auth-form">
      <div id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="your_username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" onclick="login()">Sign In</button>
      </div>
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="your_username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min. 4 characters" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" onclick="register()">Create Account</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Feed Page ── -->
<div id="feed-page" class="page">
  <div class="feed-layout">

    <!-- Posts Column -->
    <main>
      <div class="feed-header">
        <h2>Latest Stories</h2>
        <span class="post-count" id="post-count"></span>
      </div>
      <div class="posts-list" id="posts-list">
        <div class="empty-state">
          <div class="big">✦</div>
          <p>Loading stories…</p>
        </div>
      </div>
    </main>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card" id="new-post-card" style="display:none">
        <div class="sidebar-card-header"><h3>New Story</h3></div>
        <div class="sidebar-card-body">
          <div class="new-post-form">
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="new-title" placeholder="Your story title…" />
            </div>
            <div class="form-group">
              <label>Content</label>
              <textarea id="new-content" placeholder="What's on your mind…" rows="6"></textarea>
            </div>
            <button class="btn btn-primary" onclick="createPost()">Publish Post</button>
          </div>
        </div>
      </div>

      <div class="sidebar-card">
        <div class="sidebar-card-header"><h3>About Inkwell</h3></div>
        <div class="sidebar-card-body" style="font-size:0.88rem; color:var(--muted); line-height:1.7">
          A minimal blogging platform. Sign in to write, comment, and engage with stories from the community.
        </div>
      </div>
    </aside>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = "https://inkwell-blog-platform-1-10ex.onrender.com"

// ── State ───────────────────────────────────────────────────────────────────
let currentUser = null; // { user_id, username, token }

// ── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type = "success") {
  const t = document.getElementById("toast");
  const el = document.createElement("div");
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth helpers ─────────────────────────────────────────────────────────────
function authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": currentUser ? `Bearer ${currentUser.token}` : ""
  };
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: authHeaders(),
    ...opts
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Something went wrong");
  return data;
}

// ── Session persistence ──────────────────────────────────────────────────────
function saveSession(user) {
  localStorage.setItem("inkwell_user", JSON.stringify(user));
}
function loadSession() {
  try {
    const s = localStorage.getItem("inkwell_user");
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}
function clearSession() {
  localStorage.removeItem("inkwell_user");
}

// ── UI Router ────────────────────────────────────────────────────────────────
function showAuth(tab = "login") {
  document.getElementById("auth-page").classList.add("active");
  document.getElementById("feed-page").classList.remove("active");
  switchTab(tab);
}
function showFeed() {
  document.getElementById("auth-page").classList.remove("active");
  document.getElementById("feed-page").classList.add("active");
}
function switchTab(tab) {
  document.getElementById("tab-login").classList.toggle("active", tab === "login");
  document.getElementById("tab-register").classList.toggle("active", tab === "register");
  document.getElementById("login-form").style.display = tab === "login" ? "block" : "none";
  document.getElementById("register-form").style.display = tab === "register" ? "block" : "none";
}
function updateNav() {
  const loggedIn = !!currentUser;
  document.getElementById("nav-username").textContent = loggedIn ? `@${currentUser.username}` : "";
  document.getElementById("btn-logout").style.display = loggedIn ? "inline-flex" : "none";
  document.getElementById("btn-login").style.display = loggedIn ? "none" : "inline-flex";
  document.getElementById("btn-register").style.display = loggedIn ? "none" : "inline-flex";
  document.getElementById("new-post-card").style.display = loggedIn ? "block" : "none";
}

// ── Auth actions ─────────────────────────────────────────────────────────────
async function register() {
  const username = document.getElementById("reg-username").value.trim();
  const password = document.getElementById("reg-password").value;
  try {
    const data = await apiFetch("/register", {
      method: "POST",
      body: JSON.stringify({ username, password })
    });
    currentUser = { user_id: data.user_id, username: data.username, token: data.token };
    saveSession(currentUser);
    updateNav();
    showFeed();
    loadPosts();
    toast(`Welcome to Inkwell, ${data.username}!`, "success");
  } catch (e) { toast(e.message, "error"); }
}

async function login() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;
  try {
    const data = await apiFetch("/login", {
      method: "POST",
      body: JSON.stringify({ username, password })
    });
    currentUser = { user_id: data.user_id, username: data.username, token: data.token };
    saveSession(currentUser);
    updateNav();
    showFeed();
    loadPosts();
    toast(`Welcome back, ${data.username}!`, "success");
  } catch (e) { toast(e.message, "error"); }
}

function logout() {
  currentUser = null;
  clearSession();
  updateNav();
  showAuth("login");
  toast("You've been signed out", "success");
}

// ── Enter key on auth forms ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  ["login-username","login-password"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") login(); })
  );
  ["reg-username","reg-password"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") register(); })
  );
});

// ── Posts ────────────────────────────────────────────────────────────────────
async function loadPosts() {
  const list = document.getElementById("posts-list");
  list.innerHTML = `<div class="empty-state"><div class="big" style="animation:spin 1s linear infinite;display:inline-block">✦</div><p>Loading stories…</p></div>`;
  try {
    const posts = await apiFetch("/posts");
    document.getElementById("post-count").textContent =
      posts.length === 0 ? "" : `${posts.length} ${posts.length === 1 ? "post" : "posts"}`;

    if (posts.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="big">✦</div><p>No stories yet. Be the first to write!</p></div>`;
      return;
    }
    list.innerHTML = posts.map(p => renderPost(p)).join("");
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>Could not load posts. Is the server running?</p></div>`;
    toast(e.message, "error");
  }
}

function renderPost(p) {
  const isOwner = currentUser && currentUser.user_id === p.user_id;
  const ownerBtns = isOwner ? `
    <div class="post-actions">
      <button class="btn btn-edit" onclick="toggleEditForm(${p.id})">Edit</button>
      <button class="btn btn-danger" onclick="deletePost(${p.id})">Delete</button>
    </div>` : "<div></div>";

  return `
  <article class="post-card" id="post-${p.id}">
    <div class="post-card-header">
      <div class="post-meta">
        <span class="post-author">${esc(p.username)}</span>
        <span class="meta-sep">·</span>
        <span class="post-date">${formatDate(p.created_at)}</span>
      </div>
      <h2 class="post-title">${esc(p.title)}</h2>
    </div>
    <p class="post-content">${esc(p.content)}</p>
    <div class="post-footer">
      ${ownerBtns}
      <button class="comment-toggle" onclick="toggleComments(${p.id})">
        <span class="icon">💬</span>
        <span id="ccount-${p.id}">${p.comment_count} ${p.comment_count === 1 ? "comment" : "comments"}</span>
      </button>
    </div>
    <div class="edit-post-form" id="edit-form-${p.id}" style="display:none">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="edit-title-${p.id}" value="${esc(p.title)}" />
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea id="edit-content-${p.id}" rows="5">${esc(p.content)}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveEdit(${p.id})">Save</button>
        <button class="btn btn-secondary" onclick="toggleEditForm(${p.id})">Cancel</button>
      </div>
    </div>
    <div class="comments-section" id="comments-${p.id}">
      <div class="comments-heading">Discussion</div>
      <div class="comments-list" id="clist-${p.id}">
        <div style="color:var(--muted);font-size:0.85rem">Loading…</div>
      </div>
      ${currentUser ? `
      <div class="add-comment">
        <input type="text" id="cinput-${p.id}" placeholder="Add a comment…" onkeydown="if(event.key==='Enter') addComment(${p.id})" />
        <button class="btn btn-secondary" onclick="addComment(${p.id})">Post</button>
      </div>` : `<p style="font-size:0.82rem;color:var(--muted)"><a href="#" onclick="showAuth('login')" style="color:var(--accent2)">Sign in</a> to comment.</p>`}
    </div>
  </article>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatDate(iso) {
  const d = new Date(iso + (iso.endsWith("Z") ? "" : "Z"));
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}

async function createPost() {
  const title = document.getElementById("new-title").value.trim();
  const content = document.getElementById("new-content").value.trim();
  if (!title || !content) { toast("Title and content are required", "error"); return; }
  try {
    await apiFetch("/posts", { method: "POST", body: JSON.stringify({ title, content }) });
    document.getElementById("new-title").value = "";
    document.getElementById("new-content").value = "";
    toast("Story published!", "success");
    loadPosts();
  } catch (e) { toast(e.message, "error"); }
}

function toggleEditForm(postId) {
  const form = document.getElementById(`edit-form-${postId}`);
  form.style.display = form.style.display === "none" ? "block" : "none";
}

async function saveEdit(postId) {
  const title = document.getElementById(`edit-title-${postId}`).value.trim();
  const content = document.getElementById(`edit-content-${postId}`).value.trim();
  if (!title || !content) { toast("Title and content are required", "error"); return; }
  try {
    await apiFetch(`/posts/${postId}`, { method: "PUT", body: JSON.stringify({ title, content }) });
    toast("Post updated!", "success");
    loadPosts();
  } catch (e) { toast(e.message, "error"); }
}

async function deletePost(postId) {
  if (!confirm("Delete this post and all its comments?")) return;
  try {
    await apiFetch(`/posts/${postId}`, { method: "DELETE" });
    toast("Post deleted", "success");
    loadPosts();
  } catch (e) { toast(e.message, "error"); }
}

// ── Comments ─────────────────────────────────────────────────────────────────
async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  const isOpen = section.classList.contains("open");
  if (isOpen) {
    section.classList.remove("open");
  } else {
    section.classList.add("open");
    await loadComments(postId);
  }
}

async function loadComments(postId) {
  const list = document.getElementById(`clist-${postId}`);
  list.innerHTML = `<div style="color:var(--muted);font-size:0.85rem">Loading…</div>`;
  try {
    const comments = await apiFetch(`/comments/${postId}`);
    if (comments.length === 0) {
      list.innerHTML = `<p style="font-size:0.82rem;color:var(--muted);font-style:italic">No comments yet.</p>`;
    } else {
      list.innerHTML = comments.map(c => renderComment(c, postId)).join("");
    }
    // Update count label
    const countEl = document.getElementById(`ccount-${postId}`);
    if (countEl) countEl.textContent = `${comments.length} ${comments.length === 1 ? "comment" : "comments"}`;
  } catch (e) { list.innerHTML = `<p style="color:var(--accent);font-size:0.82rem">${e.message}</p>`; }
}

function renderComment(c, postId) {
  const canDel = currentUser && currentUser.user_id === c.user_id;
  return `
  <div class="comment-item" id="comment-${c.id}">
    <div class="comment-header">
      <span class="comment-author">${esc(c.username)}</span>
      <span class="comment-date">${formatDate(c.created_at)}</span>
    </div>
    <div class="comment-text">${esc(c.text)}</div>
    ${canDel ? `<button class="comment-del" onclick="deleteComment(${c.id}, ${postId})" title="Delete">✕</button>` : ""}
  </div>`;
}

async function addComment(postId) {
  const input = document.getElementById(`cinput-${postId}`);
  const text = input.value.trim();
  if (!text) return;
  try {
    await apiFetch("/comments", {
      method: "POST",
      body: JSON.stringify({ text, post_id: postId })
    });
    input.value = "";
    await loadComments(postId);
  } catch (e) { toast(e.message, "error"); }
}

async function deleteComment(commentId, postId) {
  try {
    await apiFetch(`/comments/${commentId}`, { method: "DELETE" });
    await loadComments(postId);
  } catch (e) { toast(e.message, "error"); }
}

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const session = loadSession();
  if (session) {
    currentUser = session;
    updateNav();
    showFeed();
    loadPosts();
  } else {
    showAuth("login");
  }
})();
</script>
</body>
</html>
